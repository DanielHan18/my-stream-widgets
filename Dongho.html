<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock Live Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #111; /* Nền tối để nổi bật đồng hồ */
            font-family: sans-serif;
            overflow: hidden;
        }

        .clock {
            width: 300px;
            height: 300px;
            position: relative;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tâm đồng hồ */
        .clock::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            z-index: 10;
        }

        /* Số hiển thị */
        .number {
            position: absolute;
            color: #fff;
            font-size: 22px;
            font-weight: bold;
        }
        .n12 { top: 15px; }
        .n3  { right: 20px; }
        .n6  { bottom: 15px; }
        .n9  { left: 20px; }

        /* Khung chứa từng kim để xoay */
        .hand-box {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        /* Kim giờ */
        .hour-hand {
            width: 6px;
            height: 65px;
            background: #ffffff;
            border-radius: 4px;
            margin-top: 85px; /* Đẩy kim lên nửa trên đồng hồ */
        }

        /* Kim phút */
        .minute-hand {
            width: 4px;
            height: 90px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 4px;
            margin-top: 60px;
        }

        /* Kim giây */
        .seconds-hand {
            width: 2px;
            height: 110px;
            background: #ff4757;
            border-radius: 2px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="clock">
        <div class="number n12">12</div>
        <div class="number n3">3</div>
        <div class="number n6">6</div>
        <div class="number n9">9</div>

        <!-- Bọc từng kim trong khung riêng để xoay dễ hơn -->
        <div class="hand-box" id="b-hour"><div class="hour-hand"></div></div>
        <div class="hand-box" id="b-minute"><div class="minute-hand"></div></div>
        <div class="hand-box" id="b-seconds"><div class="seconds-hand"></div></div>
    </div>

    <script>
        // Lấy các khung kim
        const bHour = document.getElementById("b-hour");
        const bMinute = document.getElementById("b-minute");
        const bSeconds = document.getElementById("b-seconds");

        function runClock() {
            const now = new Date();
            const hr = now.getHours();
            const min = now.getMinutes();
            const sec = now.getSeconds();

            // Tính góc xoay chuẩn
            const secDeg = sec * 6;
            const minDeg = (min * 6) + (sec * 0.1);
            const hrDeg = ((hr % 12) * 30) + (min * 0.5);

            // Gán góc xoay
            bHour.style.transform = "rotate(" + hrDeg + "deg)";
            bMinute.style.transform = "rotate(" + minDeg + "deg)";
            bSeconds.style.transform = "rotate(" + secDeg + "deg)";
        }

        // Chạy ngay lập tức khi mở trang
        runClock();

        // Lặp lại mỗi 1 giây (1000ms)
        setInterval(runClock, 1000);
    </script>
</body>
</html>
